<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Details</title>
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="detail-container" style="width: 100%; padding: 20px; margin: 0 auto;">
        
        <div class="top-actions" style="margin-bottom: 24px;">
            <a th:href="@{/complaints}" class="btn-secondary">&larr; Back to All Complaints</a>
        </div>

        <div class="detail-card">
            <div class="detail-header">
                <h2>Complaint #<span th:text="${complaint.id}">1</span></h2>
                <span th:class="'status-badge status-' + ${complaint.complaintStatus}" th:text="${complaint.complaintStatus}">OPEN</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <div class="detail-section">
                    <div class="detail-label">User Name</div>
                    <div class="detail-value" th:text="${complaint.userName}">John Doe</div>
                </div>

                <div class="detail-section">
                    <div class="detail-label">Issue Type</div>
                    <div class="detail-value" th:text="${complaint.issueType}">Plumbing</div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-label">Location</div>
                <div class="detail-value" th:text="${complaint.location}">Downtown</div>
            </div>

            <div class="detail-section">
                <div class="detail-label">Description</div>
                <div class="detail-value" style="white-space: pre-wrap; line-height: 1.6;" th:text="${complaint.issueDescription}">Description text goes here...</div>
            </div>

            <div class="detail-image-container" th:if="${complaint.imagePath != null}">
                <div class="detail-label" style="padding: 16px 16px 0 16px;">Attached Image</div>
                <img th:src="@{'/' + ${complaint.imagePath}}" class="detail-image" alt="Complaint Image">
            </div>
            
            <div class="detail-section" th:unless="${complaint.imagePath != null}" style="margin-top: 30px; background: #F8F9FA; padding: 20px; border-radius: 12px; text-align: center;">
                <svg xmlns="http://www.svgrepo.com/show/330752/image.svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #CBD5E0; margin-bottom: 10px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <div class="detail-value" style="color: #A0AEC0;">No image was uploaded for this complaint.</div>
            </div>

        </div>

    </div>
</body>
</html>
