spring.application.name=complaintbot

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:complaintdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LangChain4j / Google Gemini
langchain4j.google-ai-gemini.chat-model.api-key=AIzaSyCXkPc4icjvUFg5EW7GJ5DDxDNmCGBIrRM
langchain4j.google-ai-gemini.chat-model.model-name=gemini-2.5-flash
langchain4j.google-ai-gemini.chat-model.temperature=0.3

# Playwright (headless=false to debug, true for prod)
playwright.headless=false

# Multipart file upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App specific settings
app.upload.dir=uploads
playwright.headless=false

# Complaint Portal
complaint.portal.base-url=https://cmhelpline.tnega.org/portal/en/home
complaint.portal.mobile-number=6382868122
complaint.portal.max-navigation-steps=25
